version: 2
updates:
  # Keep npm dependencies fresh (grouped into one PR/week to reduce noise).
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dependencies:
        patterns: ["*"]

  # Keep the GitHub Actions versions current.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
